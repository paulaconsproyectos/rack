<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Admin — Zine Club</title>
  <link rel="icon" href="icon-192.png"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#09090b;color:#e4e4e7;font-family:'DM Sans','Helvetica Neue',sans-serif;min-height:100vh;}
    .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
    .login-card{width:100%;max-width:380px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:36px 28px;}
    .logo-img{width:56px;height:56px;border-radius:14px;object-fit:cover;margin:0 auto 20px;display:block;}
    .login-title{font-size:20px;font-weight:700;text-align:center;margin-bottom:4px;}
    .login-sub{font-size:13px;color:rgba(255,255,255,0.35);text-align:center;margin-bottom:28px;}
    .field{margin-bottom:14px;}
    label{display:block;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:7px;}
    input{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px 16px;color:#fff;font-size:14px;outline:none;}
    input:focus{border-color:rgba(99,102,241,0.6);}
    .btn{width:100%;padding:14px;background:#6366f1;color:#fff;border:none;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;}
    .err{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);border-radius:10px;padding:10px 14px;font-size:13px;color:#fca5a5;margin-bottom:14px;display:none;}
    /* Dashboard */
    .dash{display:none;padding:32px 24px;max-width:900px;margin:0 auto;}
    .dash-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;}
    .dash-logo{display:flex;align-items:center;gap:10px;}
    .dash-logo img{width:36px;height:36px;border-radius:9px;}
    .dash-title{font-size:20px;font-weight:700;}
    .logout{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.6);padding:8px 16px;border-radius:20px;font-size:12px;cursor:pointer;}
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:32px;}
    .stat-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:20px;}
    .stat-n{font-size:32px;font-weight:700;margin-bottom:4px;}
    .stat-l{font-size:12px;color:rgba(255,255,255,0.35);font-weight:600;text-transform:uppercase;letter-spacing:.06em;}
    .section-title{font-size:14px;font-weight:700;margin-bottom:14px;color:rgba(255,255,255,0.6);text-transform:uppercase;letter-spacing:.08em;}
    table{width:100%;border-collapse:collapse;margin-bottom:32px;}
    th{text-align:left;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,0.25);padding:0 0 10px;border-bottom:1px solid rgba(255,255,255,0.07);}
    td{padding:12px 0;font-size:13px;color:rgba(255,255,255,0.7);border-bottom:1px solid rgba(255,255,255,0.05);vertical-align:middle;}
    .badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;background:rgba(99,102,241,0.2);color:#a5b4fc;}
    .spinner{width:24px;height:24px;border:2px solid rgba(99,102,241,0.3);border-top-color:#6366f1;border-radius:50%;animation:spin .8s linear infinite;margin:40px auto;}
    @keyframes spin{to{transform:rotate(360deg);}}
  </style>
</head>

<script>
const PASS = 'rack2025admin';
const SB_URL = 'https://scqoqwmkptyxwpiwhkyk.supabase.co';
const SB_KEY = 'sb_publishable_GPGtFCLX8xNSIvyCznVDrg_K3xhtb4N';

function login(){
  var pw = document.getElementById('pw').value;
  if(pw === PASS){
    document.getElementById('loginWrap').style.display='none';
    document.getElementById('dash').style.display='block';
    loadData();
  } else {
    document.getElementById('err').style.display='block';
  }
}

function logout(){
  document.getElementById('loginWrap').style.display='flex';
  document.getElementById('dash').style.display='none';
  document.getElementById('pw').value='';
}

async function sbFetch(path){
  var r = await fetch(SB_URL+path, {headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
  return r.json();
}

async function loadData(){
  try {
    var users = await sbFetch('/rest/v1/users?select=*&order=created_at.desc&limit=50');
    var reviews = await sbFetch('/rest/v1/reviews?select=*&order=created_at.desc&limit=50');
    
    document.getElementById('nUsers').textContent = Array.isArray(users) ? users.length : '–';
    document.getElementById('nReviews').textContent = Array.isArray(reviews) ? reviews.length : '–';
    
    var totalWatched = 0;
    if(Array.isArray(users)) users.forEach(function(u){ totalWatched += (u.watched||[]).length; });
    document.getElementById('nWatched').textContent = totalWatched;

    // Users table
    if(Array.isArray(users) && users.length > 0){
      var ut = '<table><thead><tr><th>Usuario</th><th>Email</th><th>Score</th><th>Vistas</th><th>Registro</th></tr></thead><tbody>';
      users.forEach(function(u){
        var d = u.created_at ? new Date(u.created_at).toLocaleDateString('es-ES') : '–';
        ut += '<tr><td><strong>@'+u.handle+'</strong><br/><span style="color:rgba(255,255,255,0.4);font-size:11px">'+u.name+'</span></td>';
        ut += '<td>'+u.email+'</td>';
        ut += '<td><span class="badge">'+u.score+' pts</span></td>';
        ut += '<td>'+(u.watched||[]).length+'</td>';
        ut += '<td>'+d+'</td></tr>';
      });
      ut += '</tbody></table>';
      document.getElementById('usersTable').innerHTML = ut;
    } else {
      document.getElementById('usersTable').innerHTML = '<p style="color:rgba(255,255,255,0.3);font-size:13px">Sin datos</p>';
    }

    // Reviews table
    if(Array.isArray(reviews) && reviews.length > 0){
      var rt = '<table><thead><tr><th>Película</th><th>Usuario</th><th>Puntuación</th><th>Reseña</th><th>Fecha</th></tr></thead><tbody>';
      reviews.forEach(function(r){
        var d = r.created_at ? new Date(r.created_at).toLocaleDateString('es-ES') : '–';
        var stars = '★'.repeat(r.stars||0);
        rt += '<tr><td><strong>'+r.film+'</strong></td>';
        rt += '<td>@'+r.handle+'</td>';
        rt += '<td style="color:#FACC15">'+stars+'</td>';
        rt += '<td style="max-width:240px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+r.text+'</td>';
        rt += '<td>'+d+'</td></tr>';
      });
      rt += '</tbody></table>';
      document.getElementById('reviewsTable').innerHTML = rt;
    } else {
      document.getElementById('reviewsTable').innerHTML = '<p style="color:rgba(255,255,255,0.3);font-size:13px">Sin reseñas aún</p>';
    }
  } catch(e) {
    console.error(e);
  }
}
</script>

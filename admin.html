<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0a0a0c;
  --s1:#0f0f12;
  --s2:#141418;
  --s3:#1a1a20;
  --s4:#222228;
  --s5:#2e2e38;
  --t:#f0f0f5;
  --t2:#a0a0b8;
  --t3:#606078;
  --t4:#404055;
  --acc:#a855f7;
  --acc2:#c084fc;
  --acc3:rgba(168,85,247,0.15);
  --acc4:rgba(168,85,247,0.06);
  --glass:rgba(168,85,247,0.05);
  --glass-border:rgba(168,85,247,0.2);
  --glow:0 0 20px rgba(168,85,247,0.4);
  --glow-sm:0 0 10px rgba(168,85,247,0.3);
}
html,body{height:100%;background:var(--bg);color:var(--t);font-family:"Spline Sans",sans-serif;overflow:hidden;}
#root{height:100%;display:flex;flex-direction:column;}

/* GRAIN OVERLAY */
body::after{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:9999;
  opacity:0.035;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
}

/* AMBIENT GLOW BG */
.amb{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.amb-1{position:absolute;top:-20%;left:-10%;width:60%;height:60%;border-radius:50%;background:rgba(168,85,247,0.08);filter:blur(120px);}
.amb-2{position:absolute;bottom:-20%;right:-10%;width:50%;height:50%;border-radius:50%;background:rgba(168,85,247,0.05);filter:blur(100px);}

/* SCROLLABLE PAGE */
.page{position:relative;z-index:1;flex:1;overflow-y:auto;overflow-x:hidden;padding:0 0 90px 0;}
.page::-webkit-scrollbar{display:none;}

/* NAV */
.nav{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:rgba(10,10,12,0.85);backdrop-filter:blur(20px);
  border-top:1px solid var(--glass-border);
  padding:12px 0 max(20px,env(safe-area-inset-bottom));
}
.nav-inner{display:flex;justify-content:space-around;align-items:center;max-width:480px;margin:0 auto;}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;cursor:pointer;color:var(--t3);transition:color .2s;padding:4px 16px;}
.nav-btn.active{color:var(--acc);}
.nav-btn svg{width:24px;height:24px;}
.nav-lbl{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;}

/* GLASS CARD */
.glass{background:var(--glass);backdrop-filter:blur(12px);border:1px solid var(--glass-border);border-radius:16px;}
.glass-sm{background:var(--glass);backdrop-filter:blur(8px);border:1px solid rgba(168,85,247,0.12);border-radius:12px;}

/* TYPOGRAPHY */
.serif{font-family:"Newsreader",serif;}
.serif-italic{font-family:"Newsreader",serif;font-style:italic;}
h1,h2,h3{font-family:"Newsreader",serif;}

/* BUTTONS */
.btn-primary{
  background:var(--acc);color:#fff;border:none;border-radius:50px;
  padding:16px 36px;font-size:16px;font-weight:700;cursor:pointer;
  box-shadow:var(--glow);transition:all .2s;letter-spacing:.03em;
  font-family:"Spline Sans",sans-serif;width:100%;
}
.btn-primary:active{transform:scale(0.97);box-shadow:0 0 30px rgba(168,85,247,0.6);}
.btn-primary:hover{background:#9333ea;}
.btn-ghost{
  background:transparent;color:var(--t2);border:1px solid var(--glass-border);border-radius:50px;
  padding:12px 28px;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;
  font-family:"Spline Sans",sans-serif;
}
.btn-ghost:hover{border-color:var(--acc);color:var(--acc);}
.btn-icon{
  width:40px;height:40px;border-radius:50%;background:rgba(0,0,0,0.3);
  backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.1);
  display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;
}

/* SECTION HEADER */
.sec-hdr{display:flex;justify-content:space-between;align-items:center;padding:0 20px;margin-bottom:14px;}
.sec-title{font-size:20px;font-weight:700;letter-spacing:-.01em;}
.sec-more{font-size:12px;font-weight:700;color:var(--acc);letter-spacing:.06em;text-transform:uppercase;background:none;border:none;cursor:pointer;}

/* PILL */
.pill{display:inline-block;padding:4px 12px;border-radius:50px;font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;background:var(--acc3);color:var(--acc2);border:1px solid rgba(168,85,247,0.2);}

/* STAR */
.star{color:var(--acc);font-size:14px;}

/* INPUT */
.inp{
  width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--glass-border);
  border-radius:12px;padding:14px 16px;color:var(--t);font-size:15px;
  font-family:"Spline Sans",sans-serif;outline:none;transition:border .2s;
}
.inp:focus{border-color:var(--acc);box-shadow:var(--glow-sm);}
.inp::placeholder{color:var(--t4);}

/* POSTER */
.poster{border-radius:12px;object-fit:cover;background:var(--s3);}

/* BADGE */
.badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 10px;border-radius:50px;
  background:var(--acc3);color:var(--acc2);
  font-size:11px;font-weight:700;letter-spacing:.04em;
}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes pulse{0%,100%{box-shadow:var(--glow);}50%{box-shadow:0 0 30px rgba(168,85,247,0.6);}}
.fade-up{animation:fadeUp .4s ease both;}
.fade-in{animation:fadeIn .3s ease both;}

/* HERO CARD */
.hero-card{
  margin:0 20px;border-radius:24px;padding:36px 28px;
  background:linear-gradient(135deg,rgba(88,28,135,0.7) 0%,rgba(126,34,206,0.5) 50%,rgba(88,28,135,0.4) 100%);
  border:1px solid rgba(168,85,247,0.4);
  position:relative;overflow:hidden;text-align:center;
  box-shadow:0 8px 40px rgba(0,0,0,0.6),0 0 60px rgba(168,85,247,0.1);
  cursor:pointer;
}
.hero-card::before{
  content:"";position:absolute;top:-40%;right:-20%;width:80%;height:80%;
  border-radius:50%;background:rgba(168,85,247,0.2);filter:blur(60px);pointer-events:none;
}
.hero-card::after{
  content:"";position:absolute;bottom:-30%;left:-10%;width:60%;height:60%;
  border-radius:50%;background:rgba(147,51,234,0.15);filter:blur(50px);pointer-events:none;
}

/* POSTER ROW */
.poster-row{display:flex;gap:12px;overflow-x:auto;padding:0 20px 8px;scrollbar-width:none;}
.poster-row::-webkit-scrollbar{display:none;}

/* MOVIE CARD */
.movie-card{flex-shrink:0;width:120px;cursor:pointer;}
.movie-card img{width:120px;height:180px;border-radius:12px;object-fit:cover;background:var(--s3);display:block;}
.movie-card-title{font-size:11px;color:var(--t2);margin-top:6px;line-height:1.3;text-align:center;font-weight:500;}

/* DETAIL BACKDROP */
.detail-backdrop{width:100%;height:50vw;max-height:280px;object-fit:cover;display:block;}
.detail-grad{position:absolute;bottom:0;left:0;right:0;height:60%;background:linear-gradient(to bottom,transparent,var(--bg));}

/* QUIZ */
.quiz-opt{
  width:100%;padding:16px 20px;background:var(--glass);border:1px solid var(--glass-border);
  border-radius:14px;color:var(--t);font-size:15px;font-weight:500;
  cursor:pointer;text-align:left;transition:all .2s;margin-bottom:10px;
  font-family:"Spline Sans",sans-serif;
}
.quiz-opt:hover{background:var(--acc3);border-color:var(--acc);}
.quiz-opt.sel{background:var(--acc3);border-color:var(--acc);box-shadow:var(--glow-sm);color:var(--acc2);}
.quiz-opt-multi{display:flex;align-items:center;gap:10px;}
.quiz-check{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--t3);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.quiz-opt.sel .quiz-check{background:var(--acc);border-color:var(--acc);}

/* MOOD GRID */
.mood-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 20px;}
.mood-card{
  aspect-ratio:4/5;border-radius:16px;border:1px solid var(--glass-border);
  display:flex;flex-direction:column;justify-content:flex-end;padding:16px;
  cursor:pointer;overflow:hidden;position:relative;transition:all .2s;
}
.mood-card.sel{border-color:var(--acc);box-shadow:var(--glow);}
.mood-card-lbl{font-family:"Newsreader",serif;font-style:italic;font-size:20px;position:relative;z-index:2;}

/* PROFILE */
.stat-card{background:var(--s2);border:1px solid var(--s4);border-radius:14px;padding:16px;text-align:center;}
.stat-num{font-family:"Newsreader",serif;font-size:32px;font-weight:700;color:var(--acc2);}
.stat-lbl{font-size:10px;color:var(--t3);font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-top:2px;}

/* REVIEW CARD */
.review-card{background:var(--glass);border:1px solid var(--glass-border);border-radius:16px;padding:16px;}

/* ACTIVITY FEED */
.feed-item{display:flex;gap:12px;padding:14px 20px;border-bottom:1px solid var(--s3);}
.feed-av{width:40px;height:40px;border-radius:50%;object-fit:cover;background:var(--s3);flex-shrink:0;}

/* ONBOARDING */
.ob-slide{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 32px;text-align:center;}

/* PROGRESS BAR */
.prog-bar{height:3px;background:var(--s4);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:var(--acc);border-radius:2px;transition:width .3s;}

/* SEARCH BAR */
.search-bar{
  display:flex;align-items:center;gap:10px;background:var(--s2);
  border:1px solid var(--s4);border-radius:14px;padding:12px 16px;
  margin:0 20px 20px;
}
.search-bar input{background:none;border:none;outline:none;color:var(--t);font-size:15px;flex:1;font-family:"Spline Sans",sans-serif;}
.search-bar input::placeholder{color:var(--t4);}

/* RETO CARD */
.reto-card{
  margin:0 20px;padding:14px 16px;border-radius:14px;
  background:linear-gradient(135deg,rgba(88,28,135,0.3),rgba(126,34,206,0.15));
  border:1px solid rgba(168,85,247,0.2);
  display:flex;align-items:center;gap:12px;
}

/* TOAST */
.toast{
  position:fixed;bottom:100px;left:50%;transform:translateX(-50%);
  background:var(--s3);border:1px solid var(--glass-border);border-radius:50px;
  padding:10px 20px;font-size:13px;font-weight:600;z-index:9000;
  animation:fadeUp .3s ease both;white-space:nowrap;
}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:500;display:flex;align-items:flex-end;}
.modal-sheet{background:var(--s1);border-radius:24px 24px 0 0;padding:24px;width:100%;max-height:85vh;overflow-y:auto;}
.modal-sheet::-webkit-scrollbar{display:none;}

/* PLATFORM LOGOS */
.plat-icon{width:48px;height:48px;border-radius:12px;border:1px solid var(--s4);background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;cursor:pointer;transition:all .2s;}
.plat-icon:hover{border-color:var(--acc);}

/* HEADER */
.page-hdr{
  position:sticky;top:0;z-index:50;
  background:rgba(10,10,12,0.8);backdrop-filter:blur(16px);
  padding:16px 20px;display:flex;align-items:center;gap:12px;
  border-bottom:1px solid var(--s3);
}
</style>
</head>

/* ===== TMDB FETCH ===== */
async function fetchFilms(answers){
  var genres=[];
  if(answers.mood&&MOOD_GENRES[answers.mood])genres=genres.concat(MOOD_GENRES[answers.mood]);
  if(answers.vibe&&VIBE_GENRES[answers.vibe])genres=genres.concat(VIBE_GENRES[answers.vibe]);
  var uniqueGenres=[...new Set(genres)].slice(0,3).join(",");
  var mediaType=answers.format==="Película"?"movie":answers.format==="Serie"?"tv":"movie";
  var params="language=es-ES&sort_by=popularity.desc&vote_count.gte=100&with_genres="+uniqueGenres;
  if(answers.time==="Menos de 1h")params+="&with_runtime.lte=60";
  else if(answers.time==="1-2 horas")params+="&with_runtime.gte=60&with_runtime.lte=130";
  else if(answers.time==="Más de 2h")params+="&with_runtime.gte=120";
  var url=TMDB+"/discover/"+mediaType+"?api_key="+TMDB_KEY+"&"+params;
  try{
    var r=await fetch(url);
    var d=await r.json();
    var results=(d.results||[]).slice(0,answers.time==="Modo Maratón"?9:3);
    return results.map(function(f){
      return {
        id:f.id,
        title:f.title||f.name,
        titleEs:f.title||f.name,
        poster:f.poster_path?IMG+f.poster_path:null,
        backdrop:f.backdrop_path?ORIG+f.backdrop_path:null,
        year:(f.release_date||f.first_air_date||"").slice(0,4),
        rating:Math.round((f.vote_average||0)/2*10)/10,
        overview:f.overview||"",
        genres:(f.genre_ids||[]).slice(0,3),
        mediaType:mediaType
      };
    });
  }catch(e){return [];}
}
async function fetchSearch(q){
  var url=TMDB+"/search/multi?api_key="+TMDB_KEY+"&language=es-ES&query="+encodeURIComponent(q);
  try{
    var r=await fetch(url);
    var d=await r.json();
    return (d.results||[]).filter(function(f){return f.media_type!=="person";}).slice(0,10).map(function(f){
      return {id:f.id,title:f.title||f.name,titleEs:f.title||f.name,
        poster:f.poster_path?IMG+f.poster_path:null,backdrop:f.backdrop_path?ORIG+f.backdrop_path:null,
        year:(f.release_date||f.first_air_date||"").slice(0,4),
        rating:Math.round((f.vote_average||0)/2*10)/10,overview:f.overview||"",
        genres:(f.genre_ids||[]).slice(0,3),mediaType:f.media_type};
    });
  }catch(e){return [];}
}
async function fetchTrailer(filmId,mediaType){
  var url=TMDB+"/"+(mediaType||"movie")+"/"+filmId+"/videos?api_key="+TMDB_KEY;
  try{
    var r=await fetch(url);
    var d=await r.json();
    var trailer=(d.results||[]).find(function(v){return v.type==="Trailer"&&v.site==="YouTube";});
    return trailer?trailer.key:null;
  }catch(e){return null;}
}
async function fetchTrending(){
  var url=TMDB+"/trending/movie/week?api_key="+TMDB_KEY+"&language=es-ES";
  try{
    var r=await fetch(url);
    var d=await r.json();
    return (d.results||[]).slice(0,6).map(function(f){
      return {id:f.id,title:f.title||f.name,titleEs:f.title||f.name,
        poster:f.poster_path?IMG+f.poster_path:null,backdrop:f.backdrop_path?ORIG+f.backdrop_path:null,
        year:(f.release_date||"").slice(0,4),
        rating:Math.round((f.vote_average||0)/2*10)/10,
        overview:f.overview||"",genres:(f.genre_ids||[]).slice(0,3),mediaType:"movie"};
    });
  }catch(e){return [];}
}

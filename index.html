// TMDB fetch
async function tmdbDiscover(answers){
  const genres=(MOOD_GENRES[answers.mood]||[18]).slice(0,2).join(",");
  const page=Math.floor(Math.random()*8)+1;
  const [mr,tr]=await Promise.all([
    fetch(`${TMDB_BASE}/discover/movie?api_key=${TMDB_KEY}&language=es-ES&sort_by=vote_average.desc&vote_count.gte=400&with_genres=${genres}&page=${page}`),
    fetch(`${TMDB_BASE}/discover/tv?api_key=${TMDB_KEY}&language=es-ES&sort_by=vote_average.desc&vote_count.gte=150&with_genres=${genres}&page=${page}`),
  ]);
  const [md,td]=await Promise.all([mr.json(),tr.json()]);
  const movies=(md.results||[]).slice(0,5).map(m=>({
    id:m.id,title:m.title,titleEs:m.title,year:m.release_date?.slice(0,4)||"—",
    type:"Película",poster:m.poster_path?IMG_BASE+m.poster_path:null,
    backdrop:m.backdrop_path?IMG_ORIG+m.backdrop_path:null,
    description:m.overview||"",score:m.vote_average?.toFixed(1),
    platform:answers.platform?.includes("Todo me vale")?"—":answers.platform?.[0]||"—",
    mediaType:"movie",tmdbId:m.id,genre:"",director:"",duration:"",tags:[],
  }));
  const shows=(td.results||[]).slice(0,3).map(m=>({
    id:m.id,title:m.name,titleEs:m.name,year:m.first_air_date?.slice(0,4)||"—",
    type:"Serie",poster:m.poster_path?IMG_BASE+m.poster_path:null,
    backdrop:m.backdrop_path?IMG_ORIG+m.backdrop_path:null,
    description:m.overview||"",score:m.vote_average?.toFixed(1),
    platform:answers.platform?.includes("Todo me vale")?"—":answers.platform?.[0]||"—",
    mediaType:"tv",tmdbId:m.id,genre:"",director:"",duration:"",tags:[],
  }));
  const all=[...movies,...shows].slice(0,8);
  const detailed=await Promise.all(all.map(async item=>{
    try{
      const r=await fetch(`${TMDB_BASE}/${item.mediaType}/${item.tmdbId}?api_key=${TMDB_KEY}&language=es-ES&append_to_response=credits`);
      const d=await r.json();
      return{...item,
        genre:d.genres?.[0]?.name||"",
        director:item.mediaType==="movie"?(d.credits?.crew?.find(c=>c.job==="Director")?.name||""):(d.created_by?.[0]?.name||""),
        duration:item.mediaType==="movie"?(d.runtime?`${Math.floor(d.runtime/60)}h ${d.runtime%60}min`:""):(d.number_of_seasons?`${d.number_of_seasons} temp.`:""),
        tags:(d.genres||[]).slice(0,3).map(g=>g.name),
      };
    }catch{return item;}
  }));
  return detailed;
}

async function tmdbSearch(query){
  const r=await fetch(`${TMDB_BASE}/search/multi?api_key=${TMDB_KEY}&language=es-ES&query=${encodeURIComponent(query)}&page=1`);
  const d=await r.json();
  return(d.results||[]).filter(m=>m.media_type==="movie"||m.media_type==="tv").slice(0,12).map(m=>({
    id:m.id,title:m.title||m.name,titleEs:m.title||m.name,
    year:(m.release_date||m.first_air_date||"").slice(0,4),
    type:m.media_type==="movie"?"Película":"Serie",
    poster:m.poster_path?IMG_BASE+m.poster_path:null,
    backdrop:m.backdrop_path?IMG_ORIG+m.backdrop_path:null,
    description:m.overview||"",score:m.vote_average?.toFixed(1),
    platform:"—",mediaType:m.media_type,tmdbId:m.id,genre:"",director:"",duration:"",tags:[],
  }));
}

// ── MAIN APP ─────────────────────────────────────────────────────────────────
function App(){
  // Auth
  const [auth,setAuth]=useState(()=>LS.get("rack_auth","onboarding"));
  const [user,setUser]=useState(()=>LS.get("rack_user",null));
  const [obStep,setObStep]=useState(0);
  const [authMode,setAuthMode]=useState("login");

  // App state
  const [screen,setScreen]=useState("home");
  const [films,setFilms]=useState([]);
  const [loading,setLoading]=useState(false);
  const [selectedFilm,setSelectedFilm]=useState(null);
  const [prevScreen,setPrevScreen]=useState("home");

  // Quiz
  const [quizStep,setQuizStep]=useState(0);
  const [answers,setAnswers]=useState({});
  const [multi,setMulti]=useState([]);

  // Search
  const [searchQ,setSearchQ]=useState("");
  const [searchResults,setSearchResults]=useState([]);
  const [searching,setSearching]=useState(false);
  const searchTimer=useRef(null);

  // Social/reviews
  const [reviews,setReviews]=useState(()=>LS.get("rack_reviews",DEMO_REVIEWS));
  const [revText,setRevText]=useState("");
  const [revStars,setRevStars]=useState(0);
  const [tab,setTab]=useState("feed");

  // UI
  const [toast,setToast]=useState(null);
  const [showInvite,setShowInvite]=useState(false);
  const [copied,setCopied]=useState(false);
  const [inviteCode]=useState(()=>LS.get("rack_invite",genCode()));

  // Auth forms
  const [lHandle,setLHandle]=useState("");
  const [lPass,setLPass]=useState("");
  const [rName,setRName]=useState("");
  const [rHandle,setRHandle]=useState("");
  const [rPass,setRPass]=useState("");
  const [err,setErr]=useState("");

  // Persist
  useEffect(()=>LS.set("rack_auth",auth),[auth]);
  useEffect(()=>LS.set("rack_user",user),[user]);
  useEffect(()=>LS.set("rack_reviews",reviews),[reviews]);
  useEffect(()=>LS.set("rack_invite",inviteCode),[inviteCode]);

  const toast_=msg=>{setToast(msg);setTimeout(()=>setToast(null),2600);};

  // Onboarding
  const nextOb=()=>{
    if(obStep<ONBOARDING.length-1){setObStep(s=>s+1);}
    else{setAuth("landing");}
  };

  // Auth
  const doLogin=()=>{
    if(!lHandle.trim()||!lPass.trim()){setErr("Rellena todos los campos");return;}
    // check saved users
    const saved=LS.get("rack_users",[]);
    const allUsers=[...DEMO_USERS.map(u=>({...u,password:"1234"})),...saved];
    const found=allUsers.find(u=>u.handle===lHandle.toLowerCase().trim()&&u.password===lPass);
    if(!found){setErr("Usuario o contraseña incorrectos");return;}
    const fullUser={...found,watched:LS.get(`rack_watched_${found.id}`,[]),watchlist:LS.get(`rack_wl_${found.id}`,[])};
    setUser(fullUser);setAuth("app");setErr("");
  };
  const doRegister=()=>{
    if(!rName.trim()||!rHandle.trim()||!rPass.trim()){setErr("Rellena todos los campos");return;}
    const saved=LS.get("rack_users",[]);
    const allUsers=[...DEMO_USERS,...saved];
    if(allUsers.find(u=>u.handle===rHandle.toLowerCase().trim())){setErr("Ese nombre de usuario ya existe");return;}
    const nu={id:"u"+Date.now(),name:rName.trim(),handle:rHandle.toLowerCase().trim(),password:rPass,score:0,badge:"Espectador"};
    LS.set("rack_users",[...saved,nu]);
    setUser({...nu,watched:[],watchlist:[]});setAuth("app");setErr("");
  };
  const doLogout=()=>{
    if(user){LS.set(`rack_watched_${user.id}`,user.watched||[]);LS.set(`rack_wl_${user.id}`,user.watchlist||[]);}
    setUser(null);setAuth("landing");setScreen("home");setFilms([]);
  };

  // Save watched/watchlist on change
  useEffect(()=>{
    if(user?.id){LS.set(`rack_watched_${user.id}`,user.watched||[]);LS.set(`rack_wl_${user.id}`,user.watchlist||[]);}
  },[user?.watched,user?.watchlist]);

  // Quiz
  const q=QUESTIONS[quizStep];
  const pickOpt=val=>{
    if(q.multi){setMulti(p=>p.includes(val)?p.filter(v=>v!==val):[...p,val]);return;}
    const a={...answers,[q.id]:val};setAnswers(a);
    if(quizStep<QUESTIONS.length-1)setTimeout(()=>setQuizStep(s=>s+1),200);
    else doFetch(a);
  };
  const nextMulti=()=>{
    const a={...answers,[q.id]:multi};setAnswers(a);
    if(quizStep<QUESTIONS.length-1){setMulti([]);setQuizStep(s=>s+1);}else doFetch(a);
  };
  const exitQuiz=()=>{setQuizStep(0);setAnswers({});setMulti([]);setScreen("home");};
  const goQuiz=()=>{setScreen("quiz");setQuizStep(0);setAnswers({});setMulti([]);};

  const doFetch=async ans=>{
    setLoading(true);setScreen("results");
    try{const r=await tmdbDiscover(ans);setFilms(r);}
    catch{toast_("Error al cargar películas");}
    setLoading(false);
  };

  // Search
  useEffect(()=>{
    clearTimeout(searchTimer.current);
    if(!searchQ.trim()){setSearchResults([]);return;}
    setSearching(true);
    searchTimer.current=setTimeout(async()=>{
      try{const r=await tmdbSearch(searchQ);setSearchResults(r);}catch{}
      setSearching(false);
    },500);
  },[searchQ]);

  // Film actions
  const isW=f=>!!(user?.watched||[]).find(w=>w.id===f.id);
  const isL=f=>!!(user?.watchlist||[]).find(w=>w.id===f.id);
  const markW=f=>{
    if(!user||isW(f))return;
    const pts=Math.round((parseFloat(f.score)||5)*10);
    setUser(p=>({...p,watched:[...(p.watched||[]),f],score:p.score+pts}));
    toast_(`+${pts} puntos`);
  };
  const addL=f=>{
    if(!user||isL(f))return;
    setUser(p=>({...p,watchlist:[...(p.watchlist||[]),f]}));
    toast_("Guardada en tu lista");
  };

  // Reviews
  const submitRev=f=>{
    if(!revText.trim()||!revStars)return;
    const r={id:"r"+Date.now(),userId:user.id,userName:user.name,handle:user.handle,film:f.titleEs||f.title,text:revText,stars:revStars,likes:0,likedBy:[]};
    setReviews(p=>[r,...p]);
    setUser(p=>({...p,score:p.score+50}));
    setRevText("");setRevStars(0);
    toast_("+50 puntos");
  };
  const toggleLike=id=>{
    if(!user)return;
    setReviews(p=>p.map(r=>{
      if(r.id!==id)return r;
      const liked=r.likedBy.includes(user.id);
      return{...r,likes:liked?r.likes-1:r.likes+1,likedBy:liked?r.likedBy.filter(x=>x!==user.id):[...r.likedBy,user.id]};
    }));
  };

  const copyInvite=()=>{
    try{navigator.clipboard.writeText(`Únete a Rack con mi código: ${inviteCode} — paulaconsproyectos.github.io/rack`);}catch{}
    setCopied(true);setTimeout(()=>setCopied(false),2500);toast_("Copiado al portapapeles");
  };

  const goDetail=(f,from)=>{setPrevScreen(from||screen);setSelectedFilm(f);setScreen("detail");};

  const badge=user?getBadge(user.score):null;
  const nextB=user?getNext(user.score):null;
  const prog=badge&&nextB?((user.score-badge.min)/(nextB.min-badge.min))*100:100;
  const filmRevs=selectedFilm?reviews.filter(r=>r.film===(selectedFilm.titleEs||selectedFilm.title)):[];

  const allUsers=[...DEMO_USERS,...LS.get("rack_users",[])];

  // ── RENDER ────────────────────────────────────────────────────────────────
  return(
    <div className="app">
      <style>{CSS}</style>
      {toast&&<div className="toast">{toast}</div>}

      {/* INVITE MODAL */}
      {showInvite&&(
        <div className="overlay" onClick={()=>setShowInvite(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-handle"/>
            <div className="modal-title">Invita a tus amigos</div>
            <div className="modal-sub">Comparte tu código. Ambos ganáis puntos cinéfilos cuando se registren.</div>
            <div className="code-display">
              <div className="code-lbl">Tu código personal</div>
              <div className="code-val">{inviteCode}</div>
            </div>
            <button className="btn-primary" onClick={copyInvite}>{copied?"✓ Copiado":"Copiar enlace de invitación"}</button>
            <button className="btn-secondary" style={{marginTop:8}} onClick={()=>setShowInvite(false)}>Cerrar</button>
          </div>
        </div>
      )}

      {/* ══ ONBOARDING ══════════════════════════════════════════ */}
      {auth==="onboarding"&&(
        <div className="ob">
          <div className="ob-slides">
            {/* slide 0: logo */}
            <div className={`ob-slide ${obStep===0?"active":obStep>0?"left":"right"}`}>
              <div className="ob-logo">ra<span>ck</span></div>
              <div className="ob-sub" style={{marginTop:8}}>La app de cine para los que de verdad aman el cine.</div>
            </div>
            {ONBOARDING.map((sl,i)=>(
              <div key={i} className={`ob-slide ${obStep===i+1?"active":obStep>i+1?"left":"right"}`}>
                <div className="ob-icon">{sl.img}</div>
                <div className="ob-title">{sl.title}</div>
                <div className="ob-sub">{sl.sub}</div>
              </div>
            ))}
          </div>
          <div className="ob-dots">
            {[0,...ONBOARDING.map((_,i)=>i+1)].map(i=>(
              <div key={i} className={`ob-dot${obStep===i?" active":""}`}/>
            ))}
          </div>
          <div className="ob-bottom">
            <button className="btn-primary" onClick={nextOb}>
              {obStep<ONBOARDING.length?"Continuar":"Empezar"}
            </button>
            {obStep<ONBOARDING.length&&(
              <button className="btn-ghost" style={{textAlign:"center",padding:"8px"}} onClick={()=>setAuth("landing")}>Saltar</button>
            )}
          </div>
        </div>
      )}

      {/* ══ LANDING ═════════════════════════════════════════════ */}
      {auth==="landing"&&(
        <div className="land">
          <div className="land-hero">
            <div className="land-logo">ra<span>ck</span></div>
            <p className="land-tagline">El cine exacto para este momento.</p>
          </div>
          <div className="land-bottom">
            <button className="btn-primary" onClick={()=>{setAuthMode("register");setAuth("auth");}}>Crear cuenta</button>
            <button className="btn-secondary" onClick={()=>{setAuthMode("login");setAuth("auth");}}>Iniciar sesión</button>
          </div>
        </div>
      )}

      {/* ══ AUTH ════════════════════════════════════════════════ */}
      {auth==="auth"&&(
        <div className="auth-page">
          <div className="auth-top">
            <button className="back-btn" onClick={()=>{setAuth("landing");setErr("");}}>←</button>
          </div>
          {authMode==="login"?(
            <>
              <div className="auth-ttl">Bienvenido de vuelta</div>
              <div className="auth-sub">Entra en tu cuenta de Rack</div>
              {err&&<div className="auth-err">{err}</div>}
              <div className="field"><label>Usuario</label><input placeholder="tu_usuario" value={lHandle} onChange={e=>setLHandle(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doLogin()}/></div>
              <div className="field"><label>Contraseña</label><input type="password" placeholder="••••••••" value={lPass} onChange={e=>setLPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doLogin()}/></div>
              <div className="demo-box"><p>Prueba: <strong>sofiam</strong>, <strong>marcosr</strong>, <strong>laiat</strong> o <strong>andresb</strong> — contraseña: <strong>1234</strong></p></div>
              <button className="btn-primary" style={{marginTop:20}} onClick={doLogin}>Entrar</button>
              <div className="auth-hint">¿No tienes cuenta? <button onClick={()=>{setAuthMode("register");setErr("");}}>Regístrate</button></div>
            </>
          ):(
            <>
              <div className="auth-ttl">Únete a Rack</div>
              <div className="auth-sub">Crea tu perfil de cinéfilo</div>
              {err&&<div className="auth-err">{err}</div>}
              <div className="field"><label>Nombre completo</label><input placeholder="Tu nombre" value={rName} onChange={e=>setRName(e.target.value)}/></div>
              <div className="field"><label>Nombre de usuario</label><input placeholder="tu_usuario" value={rHandle} onChange={e=>setRHandle(e.target.value)}/></div>
              <div className="field"><label>Contraseña</label><input type="password" placeholder="••••••••" value={rPass} onChange={e=>setRPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doRegister()}/></div>
              <button className="btn-primary" style={{marginTop:12}} onClick={doRegister}>Crear cuenta</button>
              <div className="auth-hint">¿Ya tienes cuenta? <button onClick={()=>{setAuthMode("login");setErr("");}}>Inicia sesión</button></div>
            </>
          )}
        </div>
      )}

      {/* ══ APP ═════════════════════════════════════════════════ */}
      {auth==="app"&&user&&<>

        {/* HOME */}
        {screen==="home"&&(
          <>
            <div className="home-hero">
              <div className="greet-small">Buenas,</div>
              <div className="greet-big">{user.name.split(" ")[0]} <span>👋</span></div>
              <button className="quiz-cta" onClick={goQuiz}>
                <div className="qcta-l">
                  <div className="qcta-title">¿Qué veo hoy?</div>
                  <div className="qcta-sub">Test de 5 preguntas · resultados personalizados</div>
                </div>
                <div className="qcta-icon">🎬</div>
              </button>
              {films.length>0&&(
                <button className="btn-secondary" style={{marginBottom:20}} onClick={()=>setScreen("results")}>Ver últimas recomendaciones</button>
              )}
            </div>
            <div className="page" style={{paddingTop:8}}>
              <div className="stats-row">
                <div className="stat-card"><div className="stat-n">{user.score}</div><div className="stat-l">Puntos</div></div>
                <div className="stat-card"><div className="stat-n">{(user.watched||[]).length}</div><div className="stat-l">Vistas</div></div>
                <div className="stat-card"><div className="stat-n">{reviews.filter(r=>r.userId===user.id).length}</div><div className="stat-l">Reseñas</div></div>
              </div>
              <div className="invite-card" onClick={()=>setShowInvite(true)}>
                <div className="ic-l">
                  <div className="ic-title">Invitar amigos</div>
                  <div className="ic-sub">Gana puntos cuando se registren con tu código</div>
                </div>
                <div className="ic-arrow">→</div>
              </div>
              {(user.watchlist||[]).length>0&&<>
                <div className="section-title">Mi lista</div>
                {(user.watchlist||[]).slice(0,3).map((f,i)=>(
                  <div key={i} className="wl-item" onClick={()=>goDetail(f,"home")} style={{cursor:"pointer"}}>
                    {f.poster?<img className="wl-poster" src={f.poster} alt="" loading="lazy"/>:<div className="wl-poster-empty">🎬</div>}
                    <div style={{flex:1,minWidth:0}}>
                      <div className="wl-title">{f.titleEs||f.title}</div>
                      <div className="wl-meta">{f.type} · {f.year}</div>
                    </div>
                  </div>
                ))}
              </>}
            </div>
          </>
        )}

        {/* SEARCH */}
        {screen==="search"&&(
          <>
            <div className="search-wrap">
              <div className="page-logo" style={{marginBottom:20}}>ra<span style={{color:"var(--acc2)"}}>ck</span></div>
              <div className="search-box">
                <span className="search-icon">🔍</span>
                <input className="search-input" placeholder="Busca películas o series..." value={searchQ} onChange={e=>setSearchQ(e.target.value)} autoFocus/>
                {searchQ&&<button className="search-clear" onClick={()=>{setSearchQ("");setSearchResults([])}}>✕</button>}
              </div>
            </div>
            <div className="page" style={{paddingTop:0}}>
              {searching&&<div style={{textAlign:"center",padding:"40px 0",color:"var(--t3)"}}>Buscando...</div>}
              {!searching&&searchResults.length>0&&(
                <>
                  <div className="section-title">{searchResults.length} resultados</div>
                  {searchResults.map((f,i)=>(
                    <div key={i} className="film-list-item" onClick={()=>goDetail(f,"search")}>
                      {f.poster?<img className="fli-poster" src={f.poster} alt="" loading="lazy"/>:<div className="fli-poster-empty">🎬</div>}
                      <div className="fli-info">
                        <div className="fli-title">{f.titleEs||f.title}</div>
                        <div className="fli-meta">{f.type} · {f.year} {f.score>0?`· ⭐ ${f.score}`:""}</div>
                        <div className="fli-desc">{f.description}</div>
                        <div className="fli-actions" onClick={e=>e.stopPropagation()}>
                          <button className={`pill-btn ${isL(f)?"done":"neu"}`} onClick={()=>addL(f)}>{isL(f)?"✓ Lista":"+ Lista"}</button>
                          <button className={`pill-btn ${isW(f)?"done":"acc"}`} onClick={()=>markW(f)}>{isW(f)?"✓ Vista":"Marcar vista"}</button>
                        </div>
                      </div>
                    </div>
                  ))}
                </>
              )}
              {!searching&&searchQ&&searchResults.length===0&&(
                <div className="empty-state"><div className="empty-icon">🔎</div><div className="empty-txt">Sin resultados para "{searchQ}"</div></div>
              )}
              {!searchQ&&(
                <div className="empty-state"><div className="empty-icon">🍿</div><div className="empty-txt">Busca cualquier película o serie</div></div>
              )}
            </div>
          </>
        )}

        {/* QUIZ */}
        {screen==="quiz"&&(
          <div className="quiz-page">
            <div className="quiz-head">
              <div className="quiz-progress"><div className="quiz-fill" style={{width:`${((quizStep)/QUESTIONS.length)*100}%`}}/></div>
              <button className="q-exit" onClick={exitQuiz}>Salir</button>
            </div>
            <div className="quiz-body">
              <div className="q-step">{quizStep+1} de {QUESTIONS.length}</div>
              <h2 className="q-question">{q.q}</h2>
              {q.multi?(
                <>
                  <div className="multi-grid">
                    {q.opts.map(o=>(
                      <button key={o} className={`opt-btn${multi.includes(o)?" sel":""}`} onClick={()=>pickOpt(o)}>
                        {o}<span className="opt-check">{multi.includes(o)?"✓":""}</span>
                      </button>
                    ))}
                  </div>
                  <button className="quiz-next-btn" onClick={nextMulti} disabled={multi.length===0}>Continuar →</button>
                </>
              ):(
                <div className="opts-grid">
                  {q.opts.map(o=>(
                    <button key={o} className={`opt-btn${answers[q.id]===o?" sel":""}`} onClick={()=>pickOpt(o)}>{o}</button>
                  ))}
                </div>
              )}
            </div>
          </div>
        )}

        {/* LOADING */}
        {screen==="results"&&loading&&(
          <div className="loading-page">
            <div className="loading-spinner"/>
            <div className="loading-txt">Buscando en la cinemateca...</div>
          </div>
        )}

        {/* RESULTS */}
        {screen==="results"&&!loading&&(
          <>
            <div className="res-header">
              <div className="res-label">{films.length} recomendaciones · solo para ti</div>
              <div className="res-title">Para este momento</div>
            </div>
            <div className="page" style={{paddingTop:0}}>
              <div className="film-grid">
                {films.map((f,i)=>(
                  <div key={i} className="film-thumb" onClick={()=>goDetail(f,"results")}>
                    {f.poster?<img src={f.poster} alt={f.title} loading="lazy"/>:<div className="film-thumb-empty">🎬</div>}
                    <div className="film-thumb-info">
                      <div className="fti-title">{f.titleEs||f.title}</div>
                      <div className="fti-meta">
                        <span className="fti-score">⭐ {f.score}</span>
                        <span>{f.year}</span>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
              <button className="btn-primary" style={{marginTop:20}} onClick={goQuiz}>Nuevo test</button>
            </div>
          </>
        )}

        {/* DETAIL */}
        {screen==="detail"&&selectedFilm&&(
          <>
            <div className="page-back">
              <button className="back-circle" onClick={()=>setScreen(prevScreen)}>←</button>
              <span style={{fontSize:13,color:"var(--t3)"}}>Volver</span>
            </div>
            <div className="det-content" style={{paddingTop:0}}>
              {selectedFilm.backdrop
                ?<img className="det-backdrop" src={selectedFilm.backdrop} alt="" style={{marginTop:-20,borderRadius:"16px 16px 0 0"}}/>
                :<div className="det-backdrop-empty" style={{borderRadius:"16px 16px 0 0"}}>🎬</div>}
              <div className="det-row" style={{marginTop:16}}>
                {selectedFilm.poster
                  ?<img className="det-poster-sm" src={selectedFilm.poster} alt=""/>
                  :<div className="det-poster-empty">🎬</div>}
                <div className="det-meta-col">
                  <div className="det-type-badge">{selectedFilm.type}</div>
                  <div className="det-title">{selectedFilm.titleEs||selectedFilm.title}</div>
                  <div className="det-info">
                    {selectedFilm.director&&<div>{selectedFilm.director}</div>}
                    <div>{selectedFilm.year}{selectedFilm.duration&&` · ${selectedFilm.duration}`}</div>
                    {selectedFilm.genre&&<div>{selectedFilm.genre}</div>}
                  </div>
                </div>
              </div>
              <div className="score-pills">
                {selectedFilm.score>0&&<div className="score-pill"><div className="sp-n">⭐ {selectedFilm.score}</div><div className="sp-l">TMDB</div></div>}
                <div className="score-pill"><div className="sp-n" style={{fontSize:14,paddingTop:4}}>{selectedFilm.platform}</div><div className="sp-l">Plataforma</div></div>
              </div>
              {selectedFilm.description&&<p className="det-desc">{selectedFilm.description}</p>}
              <div className="det-btns">
                <button className={`det-btn p${isW(selectedFilm)?" done":""}`} onClick={()=>markW(selectedFilm)}>{isW(selectedFilm)?"✓ Ya vista":"Marcar como vista"}</button>
                <button className={`det-btn s${isL(selectedFilm)?" done":""}`} onClick={()=>addL(selectedFilm)}>{isL(selectedFilm)?"✓ En lista":"+ Mi lista"}</button>
              </div>
              <div className="section-title">Tu reseña</div>
              <div className="rev-section">
                <div className="stars">{[1,2,3,4,5].map(s=><button key={s} className={`star${s<=revStars?" on":""}`} onClick={()=>setRevStars(s)}>★</button>)}</div>
                <textarea className="rev-ta" placeholder="¿Qué te pareció? El cine necesita tu voz..." value={revText} onChange={e=>setRevText(e.target.value)}/>
                <button className="rev-sub" disabled={!revText.trim()||!revStars} onClick={()=>submitRev(selectedFilm)}>Publicar reseña</button>
              </div>
              {filmRevs.length>0&&<>
                <div className="section-title">Reseñas · {filmRevs.length}</div>
                {filmRevs.map(r=>(
                  <div key={r.id} className="rc">
                    <div className="rc-h">
                      <div className="rc-user-info">
                        <div className="rc-av">{ini(r.userName)}</div>
                        <div><div className="rc-name">{r.userName}</div><div className="rc-handle">@{r.handle}</div></div>
                      </div>
                      <div className="rc-stars">{"★".repeat(r.stars)}</div>
                    </div>
                    <p className="rc-txt">{r.text}</p>
                    <button className={`rc-like${r.likedBy.includes(user.id)?" liked":""}`} onClick={()=>toggleLike(r.id)}>♥ {r.likes}</button>
                  </div>
                ))}
              </>}
              {filmRevs.length===0&&<div className="empty-state"><div className="empty-icon">✍️</div><div className="empty-txt">Sé el primero en reseñar</div></div>}
            </div>
          </>
        )}

        {/* SOCIAL */}
        {screen==="social"&&(
          <>
            <div className="page-header"><div className="page-logo">ra<span style={{color:"var(--acc2)"}}>ck</span></div></div>
            <div className="page" style={{paddingTop:0}}>
              <div className="tab-row">
                {["feed","ranking","reseñas"].map(t=><button key={t} className={`tab-btn${tab===t?" active":""}`} onClick={()=>setTab(t)}>{t.charAt(0).toUpperCase()+t.slice(1)}</button>)}
              </div>
              {tab==="feed"&&DEMO_FEED.map((a,i)=>(
                <div key={i} className="activity-item">
                  <div className="act-av">{a.userName.split(" ").map(w=>w[0]).join("").slice(0,2)}</div>
                  <div className="act-body">
                    <div className="act-text"><strong>{a.userName}</strong> {a.action} <em>{a.film}</em></div>
                    <div className="act-time">hace {a.time}</div>
                  </div>
                </div>
              ))}
              {tab==="ranking"&&[...allUsers,{id:user.id,name:user.name,score:user.score,badge:badge?.label}]
                .filter((u,i,arr)=>arr.findIndex(x=>x.id===u.id)===i)
                .sort((a,b)=>b.score-a.score)
                .map((u,i)=>(
                <div key={u.id} className="rank-row" style={u.id===user.id?{background:"var(--s2)",borderRadius:12,padding:"14px 12px",marginBottom:2}:{}}>
                  <div className={`rank-num${i===0?" gold":""}`}>{i+1}</div>
                  <div className="rank-av">{ini(u.name)}</div>
                  <div className="rank-info">
                    <div className="rank-name">{u.name}{u.id===user.id?" (tú)":""}</div>
                    <div className="rank-badge">{u.badge||getBadge(u.score)?.label}</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div className="rank-score">{u.score}</div>
                    <div className="rank-pts">pts</div>
                  </div>
                </div>
              ))}
              {tab==="reseñas"&&reviews.map(r=>(
                <div key={r.id} className="rc" style={{paddingTop:16}}>
                  <div style={{fontSize:10,fontWeight:600,letterSpacing:".08em",textTransform:"uppercase",color:"var(--acc2)",marginBottom:8}}>{r.film}</div>
                  <div className="rc-h">
                    <div className="rc-user-info">
                      <div className="rc-av">{ini(r.userName)}</div>
                      <div><div className="rc-name">{r.userName}</div><div className="rc-handle">@{r.handle}</div></div>
                    </div>
                    <div className="rc-stars">{"★".repeat(r.stars)}</div>
                  </div>
                  <p className="rc-txt" style={{marginTop:8}}>{r.text}</p>
                  <button className={`rc-like${r.likedBy.includes(user.id)?" liked":""}`} onClick={()=>toggleLike(r.id)}>♥ {r.likes}</button>
                </div>
              ))}
            </div>
          </>
        )}

        {/* PROFILE */}
        {screen==="profile"&&(
          <>
            <div className="prof-header">
              <div className="prof-avatar">{ini(user.name)}</div>
              <div className="prof-name">{user.name}</div>
              <div className="prof-handle">@{user.handle}</div>
              <div className="prof-badge" style={{marginTop:8}}><span>{badge?.icon}</span><span>{badge?.label}</span></div>
            </div>
            <div className="page" style={{paddingTop:0}}>
              <div className="score-block">
                <div className="score-big">{user.score}</div>
                <div className="score-lbl">Puntos cinéfilos</div>
                <div className="prog-bar"><div className="prog-fill" style={{width:`${clamp(prog,0,100)}%`}}/></div>
                <div className="prog-labels"><span>{badge?.label}</span>{nextB&&<span>{nextB.label} · {nextB.min-user.score} pts</span>}</div>
              </div>
              <div className="stats-row">
                <div className="stat-card"><div className="stat-n">{(user.watched||[]).length}</div><div className="stat-l">Vistas</div></div>
                <div className="stat-card"><div className="stat-n">{reviews.filter(r=>r.userId===user.id).length}</div><div className="stat-l">Reseñas</div></div>
                <div className="stat-card"><div className="stat-n">{(user.watchlist||[]).length}</div><div className="stat-l">Lista</div></div>
              </div>
              <div className="invite-card" onClick={()=>setShowInvite(true)}>
                <div className="ic-l"><div className="ic-title">Tu código de invitación</div><div className="ic-sub" style={{fontFamily:"'DM Serif Display',serif",fontSize:18,color:"var(--acc2)",marginTop:4}}>{inviteCode}</div></div>
                <div className="ic-arrow">→</div>
              </div>
              {(user.watched||[]).length>0&&<>
                <div className="section-title">Películas vistas</div>
                {(user.watched||[]).map((f,i)=>(
                  <div key={i} className="wl-item" onClick={()=>goDetail(f,"profile")} style={{cursor:"pointer"}}>
                    {f.poster?<img className="wl-poster" src={f.poster} alt="" loading="lazy"/>:<div className="wl-poster-empty">🎬</div>}
                    <div style={{flex:1,minWidth:0}}>
                      <div className="wl-title">{f.titleEs||f.title}</div>
                      <div className="wl-meta">{f.type} · {f.year}</div>
                    </div>
                    <div className="wl-pts">+{Math.round((parseFloat(f.score)||5)*10)}</div>
                  </div>
                ))}
              </>}
              {(user.watchlist||[]).length>0&&<>
                <div className="section-title">Mi lista</div>
                {(user.watchlist||[]).map((f,i)=>(
                  <div key={i} className="wl-item" onClick={()=>goDetail(f,"profile")} style={{cursor:"pointer"}}>
                    {f.poster?<img className="wl-poster" src={f.poster} alt="" loading="lazy"/>:<div className="wl-poster-empty">🎬</div>}
                    <div style={{flex:1,minWidth:0}}>
                      <div className="wl-title">{f.titleEs||f.title}</div>
                      <div className="wl-meta">{f.type} · {f.year}</div>
                    </div>
                  </div>
                ))}
              </>}
              <button className="logout-btn" onClick={doLogout}>Cerrar sesión</button>
            </div>
          </>
        )}

        {/* NAV */}
        {screen!=="quiz"&&(
          <nav className="nav">
            {[
              {s:"home",l:"Inicio",ic:"🏠"},
              {s:"search",l:"Buscar",ic:"🔍"},
              {s:"results",l:"Para ti",ic:"✨",dis:films.length===0,fn:()=>films.length>0&&setScreen("results")},
              {s:"social",l:"Social",ic:"👥"},
              {s:"profile",l:"Perfil",ic:"👤"},
            ].map(({s,l,ic,dis,fn})=>(
              <button key={s}
                className={`nb${(screen===s||(s==="results"&&screen==="detail"&&prevScreen==="results"))?" active":""}`}
                style={{opacity:dis?0.3:1}}
                onClick={dis?undefined:(fn||(()=>setScreen(s)))}>
                <div className="nb-icon">{ic}</div>
                <span>{l}</span>
              </button>
            ))}
          </nav>
        )}
      </>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
